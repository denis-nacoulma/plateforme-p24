<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emploi du temps - P24</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f4f8; }
        .navbar {
            background: #1a56db;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .navbar h1 { color: white; font-size: 15px; }
        .navbar p { color: #bfdbfe; font-size: 11px; }
        .nav-links { display: flex; gap: 6px; flex-wrap: wrap; }
        .nav-links button {
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
        }
        .nav-links button:hover { background: white; color: #1a56db; }

        .container { max-width: 1200px; margin: 16px auto; padding: 0 12px; }
        .page-title { font-size: 18px; color: #1e3a8a; margin-bottom: 4px; }
        .page-subtitle { font-size: 12px; color: #6b7280; margin-bottom: 16px; }

        .semaine-nav {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .semaine-nav button {
            background: white;
            border: 1px solid #d1d5db;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            color: #374151;
        }
        .semaine-label {
            font-size: 13px;
            font-weight: 600;
            color: #1e3a8a;
            flex: 1;
            text-align: center;
        }

        .jours-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .jour-tab {
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            background: white;
            font-size: 12px;
            cursor: pointer;
            color: #374151;
        }
        .jour-tab.active { background: #1a56db; color: white; border-color: #1a56db; }

        .creneaux { display: flex; flex-direction: column; gap: 10px; }
        .creneau-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .creneau-heure {
            background: #1a56db;
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            min-width: 100px;
            text-align: center;
            flex-shrink: 0;
        }
        .creneau-info { flex: 1; }
        .creneau-matiere { font-size: 14px; font-weight: 600; color: #1e3a8a; }
        .creneau-prof { font-size: 12px; color: #6b7280; margin-top: 2px; }
        .creneau-salle { font-size: 11px; color: #9ca3af; margin-top: 2px; }

        .pill {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .c1 { background: #dbeafe; color: #1e40af; }
        .c2 { background: #d1fae5; color: #065f46; }
        .c3 { background: #fef3c7; color: #92400e; }
        .c4 { background: #ede9fe; color: #4c1d95; }
        .c5 { background: #fee2e2; color: #991b1b; }
        .c6 { background: #fce7f3; color: #9d174d; }
        .c7 { background: #ecfdf5; color: #064e3b; }
        .c8 { background: #fff7ed; color: #9a3412; }
        .c9 { background: #f0fdf4; color: #14532d; }
        .c10 { background: #faf5ff; color: #581c87; }
        .c11 { background: #fff1f2; color: #881337; }
        .c12 { background: #f0f9ff; color: #0c4a6e; }

        .chargement { text-align: center; padding: 40px; color: #6b7280; font-size: 14px; }
        .vide { text-align: center; padding: 40px; color: #9ca3af; font-size: 14px; }

        .footer {
            text-align: center; padding: 16px; color: #9ca3af;
            font-size: 11px; border-top: 1px solid #e5e7eb;
            background: white; margin-top: 20px;
        }

        @media (min-width: 768px) {
            .navbar { padding: 15px 30px; }
            .navbar h1 { font-size: 18px; }
            .navbar p { font-size: 13px; }
            .nav-links button { font-size: 13px; padding: 8px 16px; }
            .container { margin: 30px auto; padding: 0 20px; }
            .page-title { font-size: 22px; }
            .jour-tab { font-size: 13px; padding: 10px 20px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div>
        <h1>UFR-SEA Informatique</h1>
        <p>Université Joseph Ki-Zerbo · P24</p>
    </div>
    <div class="nav-links">
        <button onclick="window.location='index.html'">🏠</button>
        <button onclick="window.location='cahier.html'">📓</button>
        <button onclick="window.location='cours.html'">📚</button>
    </div>
</nav>

<div class="container">
    <div class="page-title">📅 Emploi du temps</div>
    <div class="page-subtitle">Promotion P24 · UFR-SEA Informatique</div>

    <div class="semaine-nav">
        <button onclick="semainePrec()">◀ Précédente</button>
        <span class="semaine-label" id="semaine-label"></span>
        <button onclick="semaineSuiv()">Suivante ▶</button>
    </div>

    <div class="jours-tabs">
        <button class="jour-tab active" onclick="afficherJour('Lundi', this)">Lundi</button>
        <button class="jour-tab" onclick="afficherJour('Mardi', this)">Mardi</button>
        <button class="jour-tab" onclick="afficherJour('Mercredi', this)">Mercredi</button>
        <button class="jour-tab" onclick="afficherJour('Jeudi', this)">Jeudi</button>
        <button class="jour-tab" onclick="afficherJour('Vendredi', this)">Vendredi</button>
        <button class="jour-tab" onclick="afficherJour('Samedi', this)">Samedi</button>
    </div>

    <div class="creneaux" id="creneaux">
        <div class="chargement">⏳ Chargement...</div>
    </div>
</div>

<div class="footer">
    UFR-SEA · Informatique · P24 · Université Joseph Ki-Zerbo · Ouagadougou
</div>

<script src="supabase.js"></script>
<script>
    let semaineOffset = 0;
    let jourActuel = 'Lundi';
    let tousLesCreneaux = [];

    const couleurs = ['c1','c2','c3','c4','c5','c6','c7','c8','c9','c10','c11','c12'];
    const matieresCouleurs = {};
    let couleurIndex = 0;

    function getCouleur(matiere) {
        if (!matieresCouleurs[matiere]) {
            matieresCouleurs[matiere] = couleurs[couleurIndex % couleurs.length];
            couleurIndex++;
        }
        return matieresCouleurs[matiere];
    }

    function getSemaine(offset) {
        const today = new Date();
        const lundi = new Date(today);
        lundi.setDate(today.getDate() - today.getDay() + 1 + (offset * 7));
        const samedi = new Date(lundi);
        samedi.setDate(lundi.getDate() + 5);
        const options = { day: 'numeric', month: 'long' };
        return `${lundi.toLocaleDateString('fr-FR', options)} — ${samedi.toLocaleDateString('fr-FR', {day:'numeric', month:'long', year:'numeric'})}`;
    }

    function getSemaineKey(offset) {
        const today = new Date();
        const lundi = new Date(today);
        lundi.setDate(today.getDate() - today.getDay() + 1 + (offset * 7));
        return `S${lundi.getFullYear()}-${String(lundi.getMonth()+1).padStart(2,'0')}-${String(lundi.getDate()).padStart(2,'0')}`;
    }

    function semainePrec() {
        semaineOffset--;
        document.getElementById('semaine-label').textContent = getSemaine(semaineOffset);
        chargerCreneaux();
    }

    function semaineSuiv() {
        semaineOffset++;
        document.getElementById('semaine-label').textContent = getSemaine(semaineOffset);
        chargerCreneaux();
    }

    async function chargerCreneaux() {
        document.getElementById('creneaux').innerHTML = '<div class="chargement">⏳ Chargement...</div>';
        try {
            const semaine = getSemaineKey(semaineOffset);
            const creneaux = await getEmploiDuTemps(semaine);
            tousLesCreneaux = creneaux;
            afficherJourCreneaux(jourActuel);
        } catch(e) {
            document.getElementById('creneaux').innerHTML = '<div class="chargement">❌ Erreur.</div>';
        }
    }

    function afficherJour(jour, btn) {
        document.querySelectorAll('.jour-tab').forEach(t => t.classList.remove('active'));
        if (btn) btn.classList.add('active');
        jourActuel = jour;
        afficherJourCreneaux(jour);
    }

    function afficherJourCreneaux(jour) {
        const container = document.getElementById('creneaux');
        const creneaux = tousLesCreneaux
            .filter(c => c.jour === jour)
            .sort((a, b) => a.heure_debut.localeCompare(b.heure_debut));

        if (creneaux.length === 0) {
            container.innerHTML = `
                <div class="vide">
                    <div style="font-size:40px; margin-bottom:12px;">📭</div>
                    <div>Aucun cours ce ${jour}</div>
                </div>`;
            return;
        }

        container.innerHTML = creneaux.map(c => {
            const couleur = getCouleur(c.matiere);
            return `
                <div class="creneau-card">
                    <div class="creneau-heure">${c.heure_debut}<br>↓<br>${c.heure_fin}</div>
                    <div class="creneau-info">
                        <div class="creneau-matiere">${c.matiere}</div>
                        <div class="creneau-prof">👨‍🏫 ${c.professeur}</div>
                        ${c.salle ? `<div class="creneau-salle">🏫 Salle : ${c.salle}</div>` : ''}
                    </div>
                    <span class="pill ${couleur}">${c.jour}</span>
                </div>
            `;
        }).join('');
    }

    // Initialisation
    document.getElementById('semaine-label').textContent = getSemaine(0);
    chargerCreneaux();
</script>

</body>
</html>
