<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - P24</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f4f8; display: flex; flex-direction: column; min-height: 100vh; }
        .navbar {
            background: #1a56db;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar h1 { color: white; font-size: 15px; }
        .navbar p { color: #bfdbfe; font-size: 11px; }
        .navbar button {
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }
        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px 20px;
            width: 100%;
            max-width: 420px;
            border: 1px solid #e5e7eb;
        }
        .card h2 { font-size: 20px; color: #1e3a8a; margin-bottom: 6px; text-align: center; }
        .card p { font-size: 13px; color: #6b7280; text-align: center; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        .form-group input, .form-group select {
            width: 100%; padding: 12px 14px;
            border: 1px solid #d1d5db; border-radius: 8px;
            font-size: 15px; outline: none;
        }
        .form-group input:focus, .form-group select:focus { border-color: #1a56db; }
        .form-group small { font-size: 11px; color: #6b7280; margin-top: 4px; display: block; }
        .btn {
            width: 100%; padding: 14px;
            background: #1a56db; color: white;
            border: none; border-radius: 8px;
            font-size: 15px; cursor: pointer; margin-top: 8px;
        }
        .btn:hover { background: #1e40af; }
        .btn:disabled { background: #93c5fd; cursor: not-allowed; }
        .link { text-align: center; margin-top: 20px; font-size: 13px; color: #6b7280; }
        .link a { color: #1a56db; text-decoration: none; font-weight: 600; }
        .msg-success {
            background: #d1fae5; color: #065f46;
            padding: 12px; border-radius: 8px;
            font-size: 13px; margin-bottom: 16px;
            display: none; text-align: center;
        }
        .msg-error {
            background: #fee2e2; color: #991b1b;
            padding: 12px; border-radius: 8px;
            font-size: 13px; margin-bottom: 16px;
            display: none; text-align: center;
        }
        .footer {
            text-align: center; padding: 16px; color: #9ca3af;
            font-size: 11px; border-top: 1px solid #e5e7eb; background: white;
        }
        @media (min-width: 768px) {
            .navbar { padding: 15px 30px; }
            .navbar h1 { font-size: 18px; }
            .navbar p { font-size: 13px; }
            .card { padding: 40px; }
            .card h2 { font-size: 22px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div>
        <h1>UFR-SEA Informatique</h1>
        <p>Université Joseph Ki-Zerbo · P24</p>
    </div>
    <div>
        <button onclick="window.location='index.html'">🏠 Accueil</button>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h2>Créer un compte</h2>
        <p>Rejoignez la plateforme de la promotion P24</p>

        <div class="msg-success" id="msg-success">✅ Compte créé ! Redirection...</div>
        <div class="msg-error" id="msg-error"></div>

        <div class="form-group">
            <label>Nom complet</label>
            <input type="text" id="nom" placeholder="Ex: Denis Nacoulma" />
        </div>
        <div class="form-group">
            <label>Adresse email</label>
            <input type="email" id="email" placeholder="votre@email.com" />
        </div>
        <div class="form-group">
            <label>INE (Identifiant National Étudiant)</label>
            <input type="text" id="numero" placeholder="Ex: N01390420241" maxlength="12" style="text-transform:uppercase;" />
            <small>1 lettre + 10 chiffres + 1 (garçon) ou 2 (fille)</small>
        </div>
        <div class="form-group">
            <label>Sexe</label>
            <select id="sexe">
                <option value="">-- Choisissez --</option>
                <option value="1">Masculin</option>
                <option value="2">Féminin</option>
            </select>
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="password" placeholder="Minimum 6 caractères" />
        </div>
        <div class="form-group">
            <label>Confirmer le mot de passe</label>
            <input type="password" id="password2" placeholder="Répétez votre mot de passe" />
        </div>

        <button class="btn" id="btn-inscription" onclick="sInscrire()">Créer mon compte</button>

        <div class="link">
            Déjà un compte ? <a href="login.html">Se connecter</a>
        </div>
    </div>
</div>

<div class="footer">
    UFR-SEA · Informatique · P24 · Université Joseph Ki-Zerbo · Ouagadougou
</div>

<script src="supabase.js"></script>
<script>
    async function sInscrire() {
        const nom = document.getElementById('nom').value.trim();
        const email = document.getElementById('email').value.trim();
        const numero = document.getElementById('numero').value.trim().toUpperCase();
        const sexe = document.getElementById('sexe').value;
        const password = document.getElementById('password').value;
        const password2 = document.getElementById('password2').value;
        const btn = document.getElementById('btn-inscription');
        const msgSuccess = document.getElementById('msg-success');
        const msgError = document.getElementById('msg-error');

        msgSuccess.style.display = 'none';
        msgError.style.display = 'none';

        if (!nom || !email || !numero || !sexe || !password) {
            msgError.style.display = 'block';
            msgError.textContent = '❌ Veuillez remplir tous les champs !';
            return;
        }

        const formatINE = /^[A-Z]\d{10}[12]$/.test(numero);
        if (!formatINE) {
            msgError.style.display = 'block';
            msgError.textContent = '❌ INE invalide ! Ex: N01390420241';
            return;
        }

        const dernierChiffre = numero.slice(-1);
        if (dernierChiffre !== sexe) {
            msgError.style.display = 'block';
            msgError.textContent = '❌ Le dernier chiffre de votre INE ne correspond pas à votre sexe !';
            return;
        }

        if (password !== password2) {
            msgError.style.display = 'block';
            msgError.textContent = '❌ Les mots de passe ne correspondent pas !';
            return;
        }

        if (password.length < 6) {
            msgError.style.display = 'block';
            msgError.textContent = '❌ Mot de passe trop court (min. 6 caractères) !';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Inscription en cours...';

        try {
            const result = await inscrireEtudiant(nom, email, numero, password);
            if (result && !result.error) {
                msgSuccess.style.display = 'block';
                localStorage.setItem('etudiant', JSON.stringify({nom, email, numero}));
                setTimeout(() => window.location = 'emploidutemps.html', 2000);
            } else {
                msgError.style.display = 'block';
                msgError.textContent = '❌ Erreur. Réessayez !';
                btn.disabled = false;
                btn.textContent = 'Créer mon compte';
            }
        } catch(e) {
            msgError.style.display = 'block';
            msgError.textContent = '❌ Erreur de connexion !';
            btn.disabled = false;
            btn.textContent = 'Créer mon compte';
        }
    }
</script>

</body>
</html>
